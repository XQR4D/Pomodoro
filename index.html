<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
    <div class="top-left-controls">
        <button class="control-button language-toggle" onclick="toggleLanguage()" title="Переключить язык">
            🌐
        </button>
        <button class="control-button theme-toggle" onclick="toggleTheme()" id="themeButton">
            🌙
        </button>
    </div>
</header>

    <main class="main-container">
        <section class="hero">
            <h1 id="title">Помодоро Таймер</h1>
            <p id="subtitle">Управляйте своим временем и работайте продуктивнее!</p>
        </section>

        <section class="timer-section container">
            <h2 id="timerTitle">Таймер Помодоро</h2>
            <div class="timer-wrapper">
                <svg class="progress-ring" viewBox="0 0 300 300">
                    <circle class="progress-ring__circle-bg" cx="150" cy="150" r="140"/>
                    <circle class="progress-ring__circle" cx="150" cy="150" r="140"/>
                </svg>
                <div class="timer-display" id="time">25:00</div>
            </div>
            <div class="preset-buttons">
                <button onclick="setTimer(25)" id="setTimer25">25 мин (Стандарт)</button>
                <button onclick="setTimer(5)" id="setTimer5">5 мин (Короткий перерыв)</button>
                <button onclick="setTimer(15)" id="setTimer15">15 мин (Длинный перерыв)</button>
            </div>
            <div class="controls">
                <button id="start" class="primary-button">Начать</button>
                <button id="reset">Сбросить</button>
            </div>
            <div class="custom-session">
                <label id="sessionLengthLabel">Кастомная длительность (мин):</label>
                <input type="number" id="sessionLength" value="25" min="1" max="120">
            </div>
        </section>

        <section class="tasks-section container">
            <h2 id="tasksTitle">Задачи</h2>
            <div class="task-input">
                <input type="text" id="newTask" placeholder="Добавить задачу">
                <button onclick="addTask()" id="addTaskButton">Добавить</button>
            </div>
            <ul id="taskList"></ul>
        </section>
    </main>

    <audio id="completionSound" src="assets/audio/completion.mp3" preload="auto"></audio>
</body>
</html>
